# Shared ALSA config for rover: mix voice-chat (ffmpeg) + TTS (aplay) on one USB speaker.
# Mount this file to /etc/asound.conf in BOTH mediamtx and control_server (see docker-compose).
# Requires both containers to share /dev/shm (already in compose) so dmix IPC works across them.
#
# Adjust card numbers to match your Pi:
#   docker exec control_server aplay -l
#   docker exec control_server arecord -l
#
# Playback: USB speaker card index from `aplay -l` (this Pi: card 3 UACDemoV10). HDMI is often 0–2.
# If you hear nothing, re-run `docker exec control_server aplay -l` and set slave.pcm + ctl card below.

pcm.dmix_rover {
  type dmix
  ipc_key 20483001
  ipc_perm 0666
  slave {
    pcm "hw:3,0"
    period_time 0
    period_size 1024
    buffer_size 8192
    rate 48000
  }
}

# Rate/format conversion into the mixer
pcm.rover_play {
  type plug
  slave.pcm "dmix_rover"
}

# Apps that open "default" get mixed playback + your capture device for recording.
pcm.!default {
  type asym
  playback.pcm "rover_play"
  capture.pcm "hw:2,0"
}

ctl.!default {
  type hw
  card 3
}
