services:
  mediamtx:
    image: bluenviron/mediamtx:latest-rpi
    # image: bluenviron/mediamtx:latest-ffmpeg
    container_name: mediamtx
    network_mode: "host"
    privileged: true
    ports:
      - "8888:8888"
      - "9997:9997" # Make sure the API port is exposed
    security_opt:
      - apparmor:unconfined
    cap_add:
      - SYS_RAWIO
    devices:
      - /dev/video0:/dev/video0
      - /dev/vchiq:/dev/vchiq
      - /dev/media0:/dev/media0
      - /dev/media1:/dev/media1
      - /dev/media2:/dev/media2
      - /dev/media3:/dev/media3
      - /dev/media4:/dev/media4
      - /dev/video0:/dev/video0
      - /dev/video10:/dev/video10
      - /dev/video11:/dev/video11
      - /dev/video12:/dev/video12
    volumes:
      - ./mediamtx.yml:/mediamtx.yml
      # Mix WebRTC/ffmpeg playback with control_server TTS on one USB speaker (ALSA dmix)
      - ./alsa/asound.conf:/etc/asound.conf:ro
      - /dev:/dev
      - /dev/shm:/dev/shm
      - ./rover.tail9d0237.ts.net.crt:/rover.tail9d0237.ts.net.crt
      - ./rover.tail9d0237.ts.net.key:/rover.tail9d0237.ts.net.key
    logging:
      driver: "json-file"
      options:
        max-size: "10m"   # Max 10MB per file
        max-file: "3"     # Keep only 3 old files
    restart: always

  control_server:
    build: .
    container_name: control_server
    working_dir: /app/src
    privileged: true
    user: "root" # Crucial for vcgencmd access
    group_add:
      - video # Gives access to hardware sensors
    volumes:
      - /dev/bus/usb:/dev/bus/usb
      - /dev/shm:/dev/shm
      - /run/udev:/run/udev:ro
      - /dev/dma_heap:/dev/dma_heap
      - ./photos:/app/photos
      - /var/run/docker.sock:/var/run/docker.sock
      - ./rover.tail9d0237.ts.net.crt:/cert.crt
      - ./rover.tail9d0237.ts.net.key:/cert.key
      - /tmp:/app/shared
      - ./server/audios:/app/audios
      # Piper TTS models (place Chinese .onnx/.json files here)
      - ./tts:/app/tts
      # Same as mediamtx: dmix so TTS and voice chat share the USB speaker
      - ./alsa/asound.conf:/etc/asound.conf:ro
    # Give the container permission to touch the hardware
    devices:
      - /dev/vchiq:/dev/vchiq
      - /dev/i2c-1:/dev/i2c-1
      - "/dev/video0:/dev/video0"
      - "/dev/v4l-subdev0:/dev/v4l-subdev0"
      - "/dev/v4l-subdev1:/dev/v4l-subdev1"
      - /dev/media0:/dev/media0
      # Sound (for TTS / espeak-ng). If no sound, on Pi run: raspi-config → Audio → force 3.5mm or HDMI
      - /dev/snd:/dev/snd
    ports:
      - "3000:3000"
    command: npm start
    # networks:
    #   - rover-net
    network_mode: "host"
    depends_on:
      - mediamtx
    restart: always
    env_file:
      - .env
    environment:
      BLINKA_FORCEBOARD: "RASPBERRY_PI_3B"
      BLINKA_FORCECHIP: "BCM2XXX"
      # Use ALSA "default" so playback goes through dmix (see ./alsa/asound.conf + mediamtx mount).
      # If you hear nothing, set dmix slave in ./alsa/asound.conf to your USB card from: docker exec control_server aplay -l
      TTS_ALSA_DEVICE: "default"
      APLAY_DEVICE_FALLBACK: "plughw:3,0"
      # Mandarin TTS engine preference: auto (edge->piper->espeak), edge, piper, or espeak
      TTS_ENGINE: "auto"
      # Edge TTS Mandarin neural voice (best quality; requires internet)
      EDGE_TTS_VOICE: "zh-CN-XiaoxiaoNeural"
      EDGE_TTS_RATE: "+0%"
      # Too low (e.g. -35%) is hard to hear on USB after short SFX; tune in .env if needed.
      EDGE_TTS_VOLUME: "-12%"
      # Piper settings (override in .env if needed)
      PIPER_MODEL_PATH: "/app/tts/zh_CN-huayan-medium.onnx"
      PIPER_SAMPLE_RATE: "22050"
    logging:
      driver: "json-file"
      options:
        max-size: "10m"   # Max 10MB per file
        max-file: "3"     # Keep only 3 old files
networks:
  rover-net:
    driver: bridge
